<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <header class="header">
        <div class="greeting">
          <h1 id="greeting"><i class="fas fa-sun"></i></h1>
          <p id="date"></p>
          <p id="time"></p>
        </div>

        <div class="name-input-group">
          <input id="nameInput" placeholder="Enter your name..." />
          <button id="setNameBtn"><i class="fas fa-check"></i> Set</button>
        </div>

        <button id="themeToggle"><i class="fas fa-moon"></i> Theme</button>
      </header>

      <section class="timer">
        <h2><i class="fas fa-clock"></i> Focus Timer</h2>
        <div id="timerDisplay">25:00</div>

        <div class="timerControls">
          <label
            >Set:
            <input
              type="number"
              id="timerMinutes"
              min="1"
              max="120"
              value="25"
            />
            min
            <input type="number" id="timerSeconds" min="0" max="59" value="0" />
            sec
            <button id="setTimer">Set</button>
          </label>
        </div>

        <div class="timerButtons">
          <button id="startTimer"><i class="fas fa-play"></i> Start</button>
          <button id="stopTimer"><i class="fas fa-pause"></i> Pause</button>
          <button id="resetTimer"><i class="fas fa-redo"></i> Reset</button>
        </div>
      </section>

      <section class="tasks">
        <h2><i class="fas fa-list-check"></i> Tasks</h2>
        <div class="taskInput">
          <input id="taskInput" placeholder="Add new task..." />
          <button id="addTask"><i class="fas fa-plus"></i></button>
        </div>
        <ul id="taskList"></ul>
      </section>

      <section class="links">
        <h2><i class="fas fa-link"></i> Quick Links</h2>
        <div class="linkInput">
          <input id="linkName" placeholder="Link name" />
          <input id="linkURL" placeholder="https://example.com" />
          <button id="addLink"><i class="fas fa-plus"></i></button>
        </div>
        <ul id="linkList"></ul>
      </section>
    </div>
    <!-- Payment Modal -->
    <div id="paymentOverlay" class="payment-overlay">
      <div class="payment-modal">
        <div class="payment-header">
          <h2><i class="fas fa-credit-card"></i> Complete Payment</h2>
          <p>Unlock full access to Life Dashboard</p>
        </div>
        <form id="paymentForm">
          <div class="form-group">
            <label>Card Number</label>
            <input
              type="text"
              id="cardNumber"
              placeholder="1234 5678 9012 3456"
              maxlength="19"
            />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Expiry</label>
              <input
                type="text"
                id="expiry"
                placeholder="MM/YY"
                maxlength="5"
              />
            </div>
            <div class="form-group">
              <label>CVV</label>
              <input type="text" id="cvv" placeholder="123" maxlength="4" />
            </div>
          </div>
          <button type="submit" id="payButton">
            <span class="button-text">Pay $9.99</span>
            <span class="button-loading" style="display: none">
              <i class="fas fa-spinner fa-spin"></i> Processing...
            </span>
          </button>
        </form>
        <div id="paymentSuccess" class="payment-success" style="display: none">
          <i class="fas fa-check-circle"></i>
          <h3>Payment Successful!</h3>
          <p>Life Dashboard unlocked. Enjoy! 🎉</p>
        </div>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
